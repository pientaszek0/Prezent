<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twoja Słodka Rozdymka 🐡❤️</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🐡</text></svg>">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700;800&display=swap');

        :root {
            --primary-pink: #ff8fab;
            --dark-pink: #fb6f92;
            --light-pink: #ffe5ec;
            --text-color: #4a4a4a;
            --ocean-blue: #a2d2ff;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--ocean-blue) 0%, #ffafbd 100%);
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- KARTA GŁÓWNA --- */
        .game-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: clamp(20px, 5vw, 30px);
            padding: clamp(1rem, 4vw, 2rem);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            
            /* Płynna szerokość i wysokość */
            width: 92vw;
            max-width: 550px;
            max-height: 95dvh; /* Użycie dynamicznego viewportu */
            overflow-y: auto;  /* Przewijanie na bardzo małych ekranach */
            
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--dark-pink);
            /* Czcionka zmienia się płynnie od 1.8rem do 2.5rem zależnie od ekranu */
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            margin: 0 0 1rem 0;
            line-height: 1.1;
        }

        /* --- DYMEK --- */
        .speech-bubble {
            background: white;
            border-radius: 20px;
            padding: clamp(10px, 3vw, 15px) clamp(15px, 4vw, 20px);
            position: relative;
            margin-bottom: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            font-weight: 700;
            color: var(--text-color);
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            min-height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounceIn 0.5s ease;
            z-index: 10;
            width: 90%;
            box-sizing: border-box;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }

        /* --- ROZDYMKA --- */
        .pet-container {
            /* Idealne skalowanie! 55vmin oznacza 55% mniejszego boku ekranu */
            width: 55vmin; 
            max-width: 350px; 
            aspect-ratio: 5 / 4; /* Zachowuje proporcje zamiast sztywnego height */
            height: auto;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .pet-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Obrazek nigdy się nie zniekształci */
            animation: float 3s ease-in-out infinite;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .pet-image.happy-jump {
            animation: jump 0.5s ease;
        }

        /* --- EFEKT WYSTRZELIWANIA EMOTEK --- */
        .emoji-particle {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            /* Wielkość cząsteczki też zależy od ekranu */
            font-size: clamp(30px, 8vmin, 50px);
            animation: particleAnimation 1.8s ease-out forwards;
        }

        @keyframes particleAnimation {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)); opacity: 0; }
        }

        /* --- PASEK SZCZĘŚCIA --- */
        .stats-container {
            width: 100%;
            margin-bottom: clamp(15px, 4vh, 25px);
        }

        .label {
            font-weight: 800;
            color: #888;
            font-size: clamp(0.75rem, 3vw, 0.9rem);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        .progress-bar-bg {
            width: 100%;
            height: clamp(14px, 3vh, 18px);
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
        }

        #happiness-fill {
            width: 10%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-pink), var(--dark-pink));
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- PRZYCISKI --- */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: clamp(8px, 2vw, 12px);
            width: 100%;
        }

        .btn-action {
            background: white;
            border: 2px solid var(--light-pink);
            padding: clamp(8px, 2vh, 15px) 5px;
            border-radius: clamp(15px, 4vw, 20px);
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: var(--dark-pink);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(4px, 1vh, 8px);
            -webkit-tap-highlight-color: transparent;
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
        }

        .btn-action:active { transform: scale(0.95); background: var(--light-pink); }
        
        .btn-action span { 
            font-size: clamp(2rem, 8vw, 2.8rem); 
            line-height: 1; 
        } 

        .btn-back {
            margin-top: clamp(15px, 3vh, 20px);
            color: #aaa;
            text-decoration: none;
            font-weight: 700;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
        }

        /* --- ANIMACJE I NAKŁADKA --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes jump { 0%, 100% { transform: scale(1) translateY(0); } 50% { transform: scale(1.1) translateY(-15px); } }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #win-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: clamp(20px, 5vw, 30px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.8s ease;
        }
    </style>
</head>
<body>

    <div class="game-card">
        <h1>Twoja Rozdymka ❤️</h1>

        <div id="bubble" class="speech-bubble">
            Cześć Skarbie! Pobawisz się ze mną?
        </div>

        <div class="pet-container">
            <img src="Usmiechnieta_Rozdymka_Bez_Tla.png" id="pet" class="pet-image" alt="Rozdymka">
        </div>

        <div class="stats-container">
            <span class="label">SZCZĘŚCIE ROZDYMKI</span>
            <div class="progress-bar-bg">
                <div id="happiness-fill"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-action" onclick="performAction('feed', '🍪')">
                <span>🍪</span> Daj smaczka
            </button>
            <button class="btn-action" onclick="performAction('pet', '👋')">
                <span>👋</span> Pogłaszcz
            </button>
            <button class="btn-action" onclick="performAction('joke', '😂')">
                <span>😂</span> Opowiedz żart
            </button>
            <button class="btn-action" onclick="performAction('love', '💖')">
                <span>💖</span> Wyślij buziaka
            </button>
        </div>

        <a href="index.html" class="btn-back">Wróć do komplementów</a>

        <div id="win-overlay">
            <h1 style="font-size: clamp(2.5rem, 10vw, 3rem);">100%!</h1>
            <p style="font-size: clamp(1rem, 5vw, 1.2rem); font-weight: 700;">Rozdymka jest najszczęśliwsza na świecie bo ma ciebie! 👸</p>
            <button class="btn-action" style="width: 80%; max-width: 250px; margin-top: 20px;" onclick="location.reload()">Zagraj jeszcze raz</button>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1474354056335069228/XsMlbhGJvC725Q6hfz5Te2kaViBXuGWqNzu1C5pnkH7FSTW4k1HElYkJGDlErKahhivQ";
        let happiness = 10;
        const petImg = document.getElementById('pet');
        const bubble = document.getElementById('bubble');
        const fill = document.getElementById('happiness-fill');
        const winOverlay = document.getElementById('win-overlay');

        const dialogues = {
            feed: ["Mmm, pyszne!", "Uwielbiam te smaczki!", "Mniam!", "Dziękuję!"],
            pet: ["Mruuuuu...", "Kocham to!", "Jak miło!", "Czuję się bezpieczna!"],
            joke: ["Hahaha!", "Dzięki za uśmiech!", "Ale super!", "Uwielbiam Twój humor!"],
            love: ["Zaraz się zarumienię! 😳", "Też Cię kocham!", "Mój brzuszek jest pełen miłości!", "Jesteś najsłodszą osobą!"]
        };

        function sendLog(msg) {
            const formData = new FormData();
            formData.append("content", msg);
            fetch(WEBHOOK_URL, { method: "POST", body: formData }).catch(() => {});
        }

        // Zaktualizowane wystrzeliwanie emotek (Zależne od rozmiaru ekranu!)
        function createEmojiBurst(emoji) {
            const container = document.querySelector('.pet-container');
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Pobieramy minimalny wymiar ekranu, by dostosować siłę wybuchu
            const vmin = Math.min(window.innerWidth, window.innerHeight);

            for (let i = 0; i < 12; i++) {
                const span = document.createElement('span');
                span.innerText = emoji;
                span.className = 'emoji-particle';
                
                const angle = Math.random() * Math.PI * 2;
                // Siła wystrzału uzależniona od wielkości ekranu (15-35% ekranu)
                const velocity = vmin * (0.15 + Math.random() * 0.20); 
                
                const dx = Math.cos(angle) * velocity + 'px';
                const dy = Math.sin(angle) * velocity + 'px';
                const dr = (Math.random() - 0.5) * 1080 + 'deg'; 

                span.style.setProperty('--dx', dx);
                span.style.setProperty('--dy', dy);
                span.style.setProperty('--dr', dr);
                
                span.style.left = centerX + 'px';
                span.style.top = centerY + 'px';

                document.body.appendChild(span);
                setTimeout(() => span.remove(), 1800); 
            }
        }

        function performAction(type, emoji) {
            if (happiness >= 100) return;
            
            happiness += 10;
            if (happiness > 100) happiness = 100;
            fill.style.width = happiness + "%";

            petImg.classList.remove('happy-jump');
            void petImg.offsetWidth;
            petImg.classList.add('happy-jump');
            
            createEmojiBurst(emoji);

            const options = dialogues[type];
            bubble.innerText = options[Math.floor(Math.random() * options.length)];
            
            sendLog(`🎮 Akcja: ${type.toUpperCase()}. Szczęście: ${happiness}%`);
            
            if (happiness === 100) {
                setTimeout(() => { 
                    winOverlay.style.display = 'flex'; 
                    sendLog("🏆 WYGRANA!"); 
                }, 600);
            }
        }

        // WYKRYWANIE POWROTU DO KARTY (BEZ BLOKADY SPAMU)
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                setTimeout(() => {
                    sendLog("Sumulacja Rozdymki: Skarb powrócił do otwartej karty 🌙.");
                }, 1000);
            }
        });

        window.onload = () => sendLog("Sumulacja Rozdymki: Skarb wszedł do gry.");
    </script>
</body>
</html>
