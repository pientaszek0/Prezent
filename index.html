<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dla Mojej Kochanej ❤️</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>💖</text></svg>">
    
    <style>
        /* ==========================================================================
           1. IMPORTY I ZMIENNE
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700;800&display=swap');

        :root {
            --primary-pink: #ff8fab;
            --dark-pink: #fb6f92;
            --light-pink: #ffe5ec;
            --text-color: #4a4a4a;
        }

        /* ==========================================================================
           2. STYLE GLOBALNE (BODY I HTML)
           ========================================================================== */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            position: fixed;  
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
            font-family: 'Nunito', sans-serif;
            overscroll-behavior: none;
        }

        /* ==========================================================================
           3. GŁÓWNY KONTENER (EFEKT SZKŁA)
           ========================================================================== */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: clamp(20px, 5vw, 25px);
            padding: clamp(1.5rem, 5vw, 2.5rem);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            
            width: 90vw;
            max-width: 480px;
            max-height: 95dvh;
            overflow-y: auto; 
            
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* ==========================================================================
           4. TYPOGRAFIA (NAGŁÓWKI I TEKSTY)
           ========================================================================== */
        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--dark-pink);
            font-size: clamp(2.2rem, 10vw, 3.5rem);
            margin: 0 0 0.5rem 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            line-height: 1.1;
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            margin-bottom: clamp(1rem, 3vh, 1.5rem);
        }

        .big-text {
            font-size: clamp(1.1rem, 5vw, 1.5rem);
            color: var(--text-color);
            font-weight: 800;
            line-height: 1.4;
        }

        #compliment-box {
            min-height: clamp(60px, 15vh, 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: clamp(1rem, 3vh, 1.5rem);
            width: 100%;
        }

        /* ==========================================================================
           5. LICZNIK CZASU
           ========================================================================== */
        #timer-container {
            background: rgba(255, 255, 255, 0.6); 
            padding: clamp(1rem, 3vh, 1.5rem);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin-bottom: clamp(1rem, 3vh, 1.5rem);
            width: 100%;
            box-sizing: border-box; 
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #timer {
            color: var(--dark-pink);
            font-variant-numeric: tabular-nums; 
        }

        /* ==========================================================================
           6. PRZYCISKI
           ========================================================================== */
        .buttons-container {
            display: flex;
            flex-direction: column; 
            gap: clamp(8px, 2vh, 12px);
            justify-content: center;
            align-items: center;
            margin-top: auto;
            width: 100%;
        }

        .btn {
            background-color: var(--dark-pink);
            color: white;
            border: none;
            padding: clamp(10px, 2vh, 12px) 10px;
            border-radius: 50px;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.4);
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none; 
            
            width: 100%; 
            max-width: 350px; 
            box-sizing: border-box;
            
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(5px, 2vw, 10px);
        }

        .btn .emoji {
            font-size: clamp(1.4rem, 6vw, 1.8rem);
            line-height: 1;
        }

        .btn:hover {
            background-color: var(--primary-pink);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 111, 146, 0.6);
        }

        .btn:active { transform: translateY(1px); }

        .btn-secondary {
            background-color: transparent;
            color: var(--dark-pink);
            border: 2px solid var(--dark-pink);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background-color: var(--light-pink); 
            color: var(--dark-pink);
            box-shadow: 0 4px 10px rgba(251, 111, 146, 0.2);
        }

        /* ==========================================================================
           7. ANIMACJE I TŁO
           ========================================================================== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .floating-element {
            position: absolute;
            bottom: -100px;
            animation: floatUp linear infinite;
            opacity: 0.6;
            z-index: 1;
            font-size: clamp(25px, 8vw, 40px); 
            pointer-events: none; 
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="background-container"></div>

    <div class="card">
        <h1>Cześć Skarbie ❤️</h1>
        <p class="subtitle">Mam dla Ciebie coś ważnego do powiedzenia:</p>
        
        <div id="compliment-box" class="big-text"></div>

        <div id="timer-container">
            <div id="timer" class="big-text">Obliczam czas...</div>
        </div>

        <div class="buttons-container">
            <button class="btn" onclick="generateCompliment(true)">
                <span class="emoji">💌</span> Wylosuj jeszcze raz <span class="emoji">💌</span>
            </button>
            
            <a href="Gra_Zadbaj_o_Rozdymke.html" class="btn btn-secondary">
                <span class="emoji">🐡</span> Zadbaj o Rozdymkę <span class="emoji">🐡</span>
            </a>
            
            <a href="walentynki-index.html" class="btn btn-secondary">
                <span class="emoji">💝</span> Prezent Walentynkowy <span class="emoji">💝</span>
            </a>
        </div>
    </div>

    <script>
        let isFirstLoad = true; 

        /* ==========================================================================
           SKRYPT 1: OBSŁUGA KOMPLEMENTÓW Z NOWĄ BAZĄ POTRZEB
           ========================================================================== */
        const compliments = [
            // --- Twoje oryginalne komplementy ---
            "Jesteś najpiękniejszą osobą, jaką znam, wewnątrz i na zewnątrz.",
            "Twój uśmiech sprawia, że każdy mój dzień staje się lepszy.",
            "Przy Tobie czuję się najszczęśliwszym człowiekiem na świecie.",
            "Twoja obecność to najlepszy prezent, jaki mogłem dostać od życia.",
            "Masz w sobie tyle ciepła i dobroci.",
            "Kocham Twoje oczy, mógłbym patrzeć w nie godzinami.",
            "Uwielbiam, kiedy się uśmiechasz - wtedy wszystko staje się prostsze.",
            "Twój śmiech to moja ulubiona melodia.",
            "Imponuje mi Twoja inteligencja i to, jak patrzysz na świat.",
            "Jesteś nie tylko piękna, ale też niesamowicie inteligentna.",
            "Uwielbiam nasze rozmowy, Twoja bystrość mnie zachwyca.",
            "Podziwiam to, jak radzisz sobie z wyzwaniami.",
            "Pamiętaj, że zawsze jestem po Twojej stronie.",
            "Cokolwiek się stanie, zawsze będę Cię wspierać.",
            "Jesteś silna, ale pamiętaj, że masz we mnie oparcie.",
            "Jestem Twoim największym fanem, zawsze.",
            "Nie mogę się doczekać naszej wspólnej przyszłości.",
            "Budowanie z Tobą życia to moje największe marzenie.",
            "Planowanie przyszłości ma sens tylko wtedy, gdy Ty w niej jesteś.",
            "Słuchanie z Tobą muzyki to jedna z moich ulubionych rzeczy.",
            "Uwielbiam to, jak przeżywasz muzykę.",
            "Jesteś moją inspiracją każdego dnia.",
            "Każda chwila z Tobą jest dla mnie wyjątkowa.",
            "Wyglądasz dziś absolutnie olśniewająco (jak zawsze!).",
            "Dziękuję, że po prostu jesteś.",
            "Kocham Cię bardziej niż wczoraj, ale mniej niż jutro.",
            "Przy Tobie czuję, że mogę być w pełni sobą.",
            "Wierzę w Ciebie bardziej niż ktokolwiek inny. Nigdy nie trać nadziei!",
            "Jesteś najsłodszą osobą na całym świecie.",
            "Gdy jestem przy Tobie, nie jestem w stanie niczym się martwić.",
            "Mówiłem już, że jesteś słodka? Dla pewności powiem: jesteś najsłodsza.",
            "Moje ramię zawsze będzie czekać, by dać Ci wytchnienie i otrzeć Twoje łzy.",
            "Twoje szczęście jest sensem mojego życia.",
            "Gdy widzę Twój uśmiech, cały świat cichnie.",
            "Gdy przymierzasz nową kreację, nie mogę oderwać od Ciebie wzroku.",
            "Uwielbiam poznawać Twój piękny umysł.",
            "Podziwiam Cię za wiedzę, jaką posiadasz.",
            "Uwielbiam Cię słuchać, bo zawsze masz coś ciekawego do powiedzenia.",
            "Moje serce bije w rytm stukania Twoich obcasów.",

            "Przy mnie zawsze możesz czuć się całkowicie bezpieczna i chroniona.",
            "Uwielbiam Cię słuchać. Twoje myśli i słowa zawsze mają dla mnie ogromne znaczenie.",
            "Zawsze będę się starał rozumieć Twoje emocje. Masz we mnie pełne wsparcie.",
            "Chcę budować naszą relację w Twoim własnym, najbardziej komfortowym tempie.",
            "Szanuję Twoje granice. Zawsze będę liczył się z Twoim zdaniem.",
            "Nigdy nie będę wywierał na Tobie presji. Nic na siłę, wszystko w swoim czasie.",
            "Uwielbiam dbać o Ciebie tak, abyś zawsze czuła się w stu procentach kobietą.",
            "Kocham Cię bezwarunkowo, akceptując każdy kawałek Twojej osobowości.",
            "Zawsze będę wierzył w Ciebie i Twoje możliwości. Nie pozwolę podciąć Ci skrzydeł.",
            "Jeśli popełnię błąd, zawsze będę potrafił Cię za to szczerze przeprosić.",
            "Nigdzie nam się nie spieszy. Nie stawiam przed Tobą żadnych deadlinów.",
            "Chcę dawać Ci miłość bez żadnych oczekiwań, całkowicie bezwarunkowo.",
            "Pamiętaj, że masz u mnie absolutne prawo do zmiany zdania w każdej kwestii.",
            "Jesteś dla mnie ważna i pożądana każdego dnia. Jesteś moim priorytetem.",
            "Zawsze będę brał Twoje obawy i uczucia na poważnie. Nigdy ich nie zbagatelizuję.",
            "Chcę dawać Ci stabilność i oparcie, na którym zawsze możesz polegać.",
            "Moje intencje wobec Ciebie są jasne i szczere - chcę Twojego szczęścia.",
            "Będę spójny w tym co mówię i co robię, żebyś zawsze miała we mnie pewność.",
            "Z przyjemnością biorę na siebie ciężar wielu decyzji, żebyś Ty mogła odpocząć.",
            "Moja lojalność wobec Ciebie jest niezachwiana. Ufam Ci i wspieram w każdej sytuacji.",
            "Wierzę w naszą przyszłość i z radością przejmuję inicjatywę w dążeniu do niej.",
            "Jesteś moją księżniczką i uwielbiam o Ciebie dbać na każdym kroku.",
            "Sprawianie Ci niespodzianek, drobnych prezentów i dawanie kwiatów to czysta radość.",
            "Twoje szczęście nie jest dla mnie transakcją. Kocham Cię, bo po prostu jesteś.",
            "Zawsze odprowadzę Cię bezpiecznie do domu, żebyś nie musiała się o nic martwić.",
            "Planowanie naszych randek to dla mnie ogromna przyjemność, uwielbiam spędzać z Tobą czas."
        ];

        const complimentBox = document.getElementById('compliment-box');

        function generateCompliment(isButtonClick = false) {
            complimentBox.style.opacity = 0;
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * compliments.length);
                const drawnCompliment = compliments[randomIndex];
                
                complimentBox.innerText = drawnCompliment;
                complimentBox.style.transition = "opacity 0.5s";
                complimentBox.style.opacity = 1;

                if (isButtonClick && !isFirstLoad) {
                    sendCustomPing(`✨ Wylosowała: *"${drawnCompliment}"*`);
                }
            }, 200);
        }

        const startDate = new Date(2025, 11, 8, 10, 0, 0); 

        function updateTimer() {
            const now = new Date();
            
            if (now < startDate) {
                document.getElementById('timer').innerText = "Odliczamy do 8.12.2025...";
                return;
            }

            let years = now.getFullYear() - startDate.getFullYear();
            let m = now.getMonth() - startDate.getMonth();
            if (m < 0 || (m === 0 && now.getDate() < startDate.getDate())) {
                years--;
            }

            let lastAnniversary = new Date(startDate);
            lastAnniversary.setFullYear(startDate.getFullYear() + years);

            let diffTime = now - lastAnniversary;
            let days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diffTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((diffTime % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((diffTime % (1000 * 60)) / 1000);

            const sYears = years === 1 ? 'roku' : 'lat';
            const sDays = days === 1 ? 'dnia' : 'dni';
            const sHours = hours === 1 ? 'godziny' : 'godzin';
            const sMinutes = minutes === 1 ? 'minuty' : 'minut';
            const sSeconds = seconds === 1 ? 'sekundy' : 'sekund';

            let timerHtml = `Już od `;
            if (years > 0) {
                timerHtml += `${years} ${sYears}, `;
            }
            timerHtml += `${days} ${sDays},<br>${hours} ${sHours}, ${minutes} ${sMinutes} i ${seconds} ${sSeconds}`;

            document.getElementById('timer').innerHTML = timerHtml;
        }

        setInterval(updateTimer, 1000);

        function createFloatingBackground() {
            const container = document.body;
            const symbols = ['🌸', '🌹', '🌺', '🌷', '🪷', '❤️', '💖', '💕', '💗', '💓', '💞', '💟', '💘', '💝', '💌', '✨', '🎀'];
            
            for (let i = 0; i < 25; i++) {
                const span = document.createElement('span');
                span.classList.add('floating-element');
                
                span.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                span.style.left = Math.random() * 100 + 'vw';
                
                const minSize = window.innerWidth > 600 ? 40 : 25;
                span.style.fontSize = (Math.random() * minSize + minSize) + 'px';
                span.style.animationDuration = (Math.random() * 5 + 5) + 's';
                span.style.animationDelay = (Math.random() * 5 + 5) + 's';
                
                container.appendChild(span);
            }
        }

        function sendPagePing(pageName) {
            const webhookUrl = "https://discord.com/api/webhooks/1474354056335069228/XsMlbhGJvC725Q6hfz5Te2kaViBXuGWqNzu1C5pnkH7FSTW4k1HElYkJGDlErKahhivQ"; 
            const now = new Date().toLocaleString("pl-PL");

            const formData = new FormData();
            formData.append("content", `💖 Skarb właśnie otworzył stronę: **${pageName}**! (Czas: ${now})`);

            fetch(webhookUrl, { method: "POST", body: formData }).catch(() => {});
        }

        function sendCustomPing(message) {
            const webhookUrl = "https://discord.com/api/webhooks/1474354056335069228/XsMlbhGJvC725Q6hfz5Te2kaViBXuGWqNzu1C5pnkH7FSTW4k1HElYkJGDlErKahhivQ"; 
            const formData = new FormData();
            formData.append("content", message);
            fetch(webhookUrl, { method: "POST", body: formData }).catch(() => {});
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                setTimeout(() => {
                    sendPagePing("Komplementy (Powrót do otwartej karty 🌙)");
                }, 1000);
            }
        });

        window.onload = function() {
            generateCompliment();
            updateTimer();
            createFloatingBackground();
            
            sendPagePing("Komplementy"); 

            setTimeout(() => { isFirstLoad = false; }, 500);
        };
    </script>
</body>
</html>
